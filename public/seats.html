<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Seats — LuxeCinema</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages.css">
</head>
<body>
  <div class="loader-overlay" id="pageLoader"><div class="loader-spinner"></div></div>
  <div id="navbar"></div>

  <main class="container seats-page">
    <h1 class="section-title" id="seatTitle">Select Your Seats</h1>
    <p class="section-subtitle" id="seatSubtitle"></p>

    <div class="seat-layout-wrap glass-card">
      <div class="screen-label">Screen</div>
      <div class="seat-grid" id="seatGrid"></div>
      <div class="seat-legend">
        <div class="legend-item"><span class="legend-dot" style="background:rgba(34,197,94,0.5);border:1px solid var(--success)"></span> Available</div>
        <div class="legend-item"><span class="legend-dot" style="background:rgba(168,85,247,0.5)"></span> Premium</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--gradient-gold)"></span> Selected</div>
        <div class="legend-item"><span class="legend-dot" style="background:rgba(239,68,68,0.5)"></span> Booked</div>
      </div>
    </div>
  </main>

  <div class="seat-summary-bar" id="summaryBar" style="display:none">
    <div>
      <strong id="selectedSeatsText">0 seats selected</strong>
      <span class="text-muted" style="margin-left:1rem" id="seatList"></span>
    </div>
    <div style="display:flex;align-items:center;gap:1.5rem">
      <span class="text-gold" style="font-size:1.25rem;font-weight:700" id="totalPrice">$0.00</span>
      <button class="btn btn-primary" id="proceedBtn">Proceed to Payment</button>
    </div>
  </div>

  <script src="/js/toast.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/pages/seats.js"></script>
</body>
</html>

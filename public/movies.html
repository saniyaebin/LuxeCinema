<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movies — LuxeCinema</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages.css">
</head>
<body>
  <div class="loader-overlay" id="pageLoader"><div class="loader-spinner"></div></div>
  <div id="navbar"></div>

  <main class="container section" style="padding-top:calc(var(--nav-height) + 2rem)">
    <h1 class="section-title">Now <span class="text-gold">Showing</span></h1>
    <p class="section-subtitle">Find your next cinematic adventure</p>

    <div class="movies-toolbar">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="form-control" placeholder="Search movies...">
      </div>
      <select id="genreFilter" class="filter-select">
        <option value="">All Genres</option>
      </select>
      <select id="languageFilter" class="filter-select">
        <option value="">All Languages</option>
      </select>
    </div>

    <div class="movies-grid" id="moviesGrid"></div>
    <p id="emptyState" class="text-muted" style="display:none;text-align:center;padding:3rem">No movies found.</p>
  </main>

  <div id="footer"></div>

  <script src="/js/toast.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/pages/movies.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — LuxeCinema</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages.css">
</head>
<body>
  <div class="loader-overlay" id="pageLoader"><div class="loader-spinner"></div></div>
  <div id="navbar"></div>

  <main class="container section" style="padding-top:calc(var(--nav-height) + 2rem)">
    <h1 class="section-title">Admin <span class="text-gold">Panel</span></h1>
    <div class="admin-tabs" id="adminTabs">
      <button class="admin-tab active" data-panel="analytics">Analytics</button>
      <button class="admin-tab" data-panel="movies">Movies</button>
      <button class="admin-tab" data-panel="shows">Shows</button>
      <button class="admin-tab" data-panel="theaters">Theaters</button>
      <button class="admin-tab" data-panel="bookings">Bookings</button>
    </div>
    <div id="adminPanel"></div>
  </main>

  <div class="modal-overlay" id="modal">
    <div class="modal glass-card" id="modalBody"></div>
  </div>

  <script src="/js/toast.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/pages/admin.js"></script>
</body>
</html>

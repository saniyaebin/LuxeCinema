<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — LuxeCinema</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages.css">
</head>
<body>
  <div id="navbar"></div>
  <div class="auth-page">
    <div class="auth-card glass-card">
      <h1>Create Account</h1>
      <p class="subtitle">Join LuxeCinema for exclusive premieres and rewards</p>
      <form id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" class="form-control" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-control" placeholder="you@email.com" required>
        </div>
        <div class="form-group">
          <label for="phone">Phone (optional)</label>
          <input type="tel" id="phone" class="form-control" placeholder="+1 555-0000">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Min. 6 characters" required minlength="6">
        </div>
        <div class="form-group">
          <label for="confirm">Confirm Password</label>
          <input type="password" id="confirm" class="form-control" placeholder="Repeat password" required>
          <div class="form-error" id="confirmError"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
      </form>
      <p class="auth-divider">Already have an account? <a href="/login.html" class="auth-link">Sign in</a></p>
    </div>
  </div>
  <script src="/js/toast.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/navbar.js"></script>
  <script>
    document.getElementById('navbar').innerHTML = renderNavbar();
    initNavbar();
    if (Auth.isLoggedIn()) window.location.href = '/dashboard.html';

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      if (password !== confirm) {
        document.getElementById('confirmError').textContent = 'Passwords do not match';
        return;
      }
      document.getElementById('confirmError').textContent = '';
      try {
        const data = await API.post('/auth/register', {
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          phone: document.getElementById('phone').value,
          password,
        });
        API.setToken(data.token);
        API.setUser(data.user);
        Toast.success('Account created!');
        setTimeout(() => { window.location.href = '/dashboard.html'; }, 500);
      } catch (err) {
        Toast.error(err.message);
      }
    });
  </script>
</body>
</html>
